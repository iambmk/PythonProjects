name: Run Scheduled Python Script

on:
  schedule:
    # Runs every day at 12:00 UTC (5:30 PM IST)
    - cron: '0 12 * * *'
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    # Added working-directory so it finds your requirements.txt inside Rain_Alert
    - name: Install dependencies
      defaults:
        run:
          working-directory: ./Rain_Alert
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Added working-directory so it executes main.py inside Rain_Alert
    - name: Run Python script
      defaults:
        run:
          working-directory: ./Rain_Alert
      run: python main.py
